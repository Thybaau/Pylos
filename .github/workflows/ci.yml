name: CI

on:
  push:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Lint with clippy
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test --verbose

  build-and-push:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: |
            ghcr.io/jzacharie/pylos:latest-${{ matrix.arch }}
            ghcr.io/jzacharie/pylos:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/jzacharie/pylos-cache:backend-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/jzacharie/pylos-cache:backend-${{ matrix.arch }},mode=max

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: |
            ghcr.io/jzacharie/pylos-ui:latest-${{ matrix.arch }}
            ghcr.io/jzacharie/pylos-ui:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/jzacharie/pylos-cache:frontend-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/jzacharie/pylos-cache:frontend-${{ matrix.arch }},mode=max

  merge-manifest:
    name: Merge Multi-Arch Manifests
    needs: [check, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push backend manifest
        run: |
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos:latest \
            ghcr.io/jzacharie/pylos:latest-amd64 \
            ghcr.io/jzacharie/pylos:latest-arm64
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos:${{ github.sha }} \
            ghcr.io/jzacharie/pylos:${{ github.sha }}-amd64 \
            ghcr.io/jzacharie/pylos:${{ github.sha }}-arm64

      - name: Create and push frontend manifest
        run: |
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos-ui:latest \
            ghcr.io/jzacharie/pylos-ui:latest-amd64 \
            ghcr.io/jzacharie/pylos-ui:latest-arm64
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos-ui:${{ github.sha }} \
            ghcr.io/jzacharie/pylos-ui:${{ github.sha }}-amd64 \
            ghcr.io/jzacharie/pylos-ui:${{ github.sha }}-arm64

  deploy-dev:
    name: Deploy to Dev (canary)
    needs: [merge-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy new version to dev
        run: |
          sed "s|image: ghcr.io/jzacharie/pylos:latest|image: ghcr.io/jzacharie/pylos:${{ github.sha }}|" k8s/pylos-dev-deployment.yaml | kubectl apply -n pylos -f -
          kubectl rollout status -n pylos deployment/pylos-dev --timeout=5m

      - name: Diagnose on failure
        if: failure()
        run: |
          kubectl get pods -n pylos -l app=pylos-dev -o wide
          kubectl describe pod -n pylos -l app=pylos-dev 2>&1 | tail -40 || true
          kubectl get events -n pylos --sort-by='.lastTimestamp' 2>&1 | tail -20 || true

  deploy-prod:
    name: Deploy to Production
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply production manifests
        run: kubectl apply -n pylos -f k8s/pylos-deployment.yaml -f k8s/pylos-service.yaml -f k8s/pylos-ui-deployment.yaml -f k8s/pylos-ui-service.yaml

      - name: Rolling update - pylos backend
        run: |
          kubectl set image -n pylos deployment/pylos pylos=ghcr.io/jzacharie/pylos:${{ github.sha }}
          kubectl rollout status -n pylos deployment/pylos --timeout=5m

      - name: Rolling update - pylos UI
        run: |
          kubectl set image -n pylos deployment/pylos-ui pylos-ui=ghcr.io/jzacharie/pylos-ui:${{ github.sha }}
          kubectl rollout status -n pylos deployment/pylos-ui --timeout=5m

      - name: Verify production deployment
        run: |
          kubectl get pods -n pylos -l app=pylos -o wide
          kubectl get pods -n pylos -l app=pylos-ui -o wide
