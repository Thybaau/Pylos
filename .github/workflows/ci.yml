name: CI

on:
  push:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      # - name: Format check
      #   run: cargo fmt --all -- --check
      - name: Lint with clippy
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test --verbose

  build-and-push:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: |
            ghcr.io/jzacharie/pylos:latest-${{ matrix.arch }}
            ghcr.io/jzacharie/pylos:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/jzacharie/pylos-cache:backend-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/jzacharie/pylos-cache:backend-${{ matrix.arch }},mode=max

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: |
            ghcr.io/jzacharie/pylos-ui:latest-${{ matrix.arch }}
            ghcr.io/jzacharie/pylos-ui:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/jzacharie/pylos-cache:frontend-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/jzacharie/pylos-cache:frontend-${{ matrix.arch }},mode=max

  merge-manifest:
    name: Merge Multi-Arch Manifests
    needs: [check, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push backend manifest
        run: |
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos:latest \
            ghcr.io/jzacharie/pylos:latest-amd64 \
            ghcr.io/jzacharie/pylos:latest-arm64
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos:${{ github.sha }} \
            ghcr.io/jzacharie/pylos:${{ github.sha }}-amd64 \
            ghcr.io/jzacharie/pylos:${{ github.sha }}-arm64

      - name: Create and push frontend manifest
        run: |
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos-ui:latest \
            ghcr.io/jzacharie/pylos-ui:latest-amd64 \
            ghcr.io/jzacharie/pylos-ui:latest-arm64
          docker buildx imagetools create -t ghcr.io/jzacharie/pylos-ui:${{ github.sha }} \
            ghcr.io/jzacharie/pylos-ui:${{ github.sha }}-amd64 \
            ghcr.io/jzacharie/pylos-ui:${{ github.sha }}-arm64

  deploy-dev:
    name: Deploy to Dev (canary)
    needs: [merge-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Checkout GitOps repo (jo3)
        uses: actions/checkout@v4
        with:
          repository: JZacharie/jo3
          token: ${{ secrets.GH_PAT }}
          path: jo3

      - name: Deploy dev canary
        run: |
          cp jo3/values/ai/pylos/manifests/deployment.yaml jo3/values/ai/pylos/manifests/dev-deployment.yaml
          sed -i "s|name: pylos-server|name: pylos-dev|" jo3/values/ai/pylos/manifests/dev-deployment.yaml
          sed -i "s|app: pylos-server|app: pylos-dev|g" jo3/values/ai/pylos/manifests/dev-deployment.yaml
          sed -i "s|replicas: 1|replicas: 1|" jo3/values/ai/pylos/manifests/dev-deployment.yaml
          sed -i "0,/image: ghcr.io/ s|image: ghcr.io/jzacharie/pylos:latest|image: ghcr.io/jzacharie/pylos:${{ github.sha }}|" jo3/values/ai/pylos/manifests/dev-deployment.yaml
          # Supprimer la partie pylos-ui (ne garder que le backend)
          awk 'BEGIN{n=0} /^---/{n++;next} n==0' jo3/values/ai/pylos/manifests/dev-deployment.yaml > /tmp/dev-only.yaml
          mv /tmp/dev-only.yaml jo3/values/ai/pylos/manifests/dev-deployment.yaml
          cd jo3
          git add values/ai/pylos/manifests/dev-deployment.yaml
          git -c user.name="Pylos CI" -c user.email="ci@pylos.dev" commit -m "chore(ai/pylos): deploy dev canary ${{ github.sha }}"
          git push

      - name: Wait for ArgoCD sync
        run: |
          sleep 15
          kubectl rollout status -n pylos deployment/pylos-dev --timeout=5m

      - name: Diagnose on failure
        if: failure()
        run: |
          kubectl get pods -n pylos -o wide
          kubectl describe pod -n pylos -l app=pylos-dev 2>&1 | tail -30 || true

  deploy-prod:
    name: Deploy to Production
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout GitOps repo (jo3)
        uses: actions/checkout@v4
        with:
          repository: JZacharie/jo3
          token: ${{ secrets.GH_PAT }}
          path: jo3

      - name: Update production image tags
        run: |
          SHA="${{ github.sha }}"
          sed -i "s|image: ghcr.io/jzacharie/pylos:latest|image: ghcr.io/jzacharie/pylos:$SHA|" jo3/values/ai/pylos/manifests/deployment.yaml
          sed -i "s|image: ghcr.io/jzacharie/pylos-ui:latest|image: ghcr.io/jzacharie/pylos-ui:$SHA|" jo3/values/ai/pylos/manifests/deployment.yaml
          cd jo3
          git add values/ai/pylos/manifests/deployment.yaml
          git -c user.name="Pylos CI" -c user.email="ci@pylos.dev" commit -m "chore(ai/pylos): deploy production ${{ github.sha }}"
          git push

      - name: Wait for ArgoCD sync
        run: |
          sleep 15
          kubectl rollout status -n pylos deployment/pylos-server --timeout=5m
          kubectl rollout status -n pylos deployment/pylos-ui --timeout=5m

      - name: Remove dev canary
        run: |
          cd jo3
          git rm values/ai/pylos/manifests/dev-deployment.yaml 2>/dev/null || true
          git -c user.name="Pylos CI" -c user.email="ci@pylos.dev" commit -m "chore(ai/pylos): remove dev canary after prod deploy" 2>/dev/null || true
          git push 2>/dev/null || true

      - name: Verify production deployment
        run: kubectl get pods -n pylos -o wide
