name: PR Tests (Requires Approval)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test"
        required: false
        type: string
  pull_request:
    branches: [ main, master ]

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check.outputs.should-skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check if pipeline should be skipped
        id: check
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MESSAGE" == *"--skip-ci"* ]]; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

  run-tests:
    needs: [check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit || true

      - name: Add comment to PR
        if: github.event.pull_request.number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🧪 **Test run starting for Pylos...**

          **Test Suite Includes:**
          - 📦 Workspace Build Validation
          - 🔍 Clippy Lints
          - 🧪 Unit Tests
          - 🛡️ Security Audit

          [View workflow run →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Make test script executable
        run: chmod +x .github/workflows/scripts/run-tests.sh

      - name: Run tests
        run: ./.github/workflows/scripts/run-tests.sh

      - name: Report test results
        if: always() && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "✅ **All Pylos tests passed successfully!**

            All test suites have completed without errors.

            [View detailed results →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "❌ **Pylos tests failed**

            One or more test suites failed. Please review the failures.

            [View detailed results →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
