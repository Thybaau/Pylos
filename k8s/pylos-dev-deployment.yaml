apiVersion: apps/v1
kind: Deployment
metadata:
  name: pylos-dev
  labels:
    app: pylos-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pylos-dev
  template:
    metadata:
      labels:
        app: pylos-dev
    spec:
      containers:
        - name: pylos
          image: ghcr.io/jzacharie/pylos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pylos-config
                optional: true
            - secretRef:
                name: pylos-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
