apiVersion: apps/v1
kind: Deployment
metadata:
  name: pylos-ui
  labels:
    app: pylos-ui
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: pylos-ui
  template:
    metadata:
      labels:
        app: pylos-ui
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: pylos-ui
          image: ghcr.io/jzacharie/pylos-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
