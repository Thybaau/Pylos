apiVersion: apps/v1
kind: Deployment
metadata:
  name: pylos
  labels:
    app: pylos
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: pylos
  template:
    metadata:
      labels:
        app: pylos
    spec:
      containers:
        - name: pylos
          image: ghcr.io/jzacharie/pylos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pylos-config
                optional: true
            - secretRef:
                name: pylos-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
