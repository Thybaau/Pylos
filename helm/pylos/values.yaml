namespace: pylos

imagePullSecrets:
  - name: ghcr-auth

config: |
  {
    "version": 2,
    "server": {
      "port": 3000,
      "log_level": "info",
      "enable_logging": true,
      "disable_content_logging": false,
      "database_url": "env.DATABASE_URL"
    },
    "providers": {
      "ollama": {
        "keys": [
          {
            "name": "local",
            "value": "ollama",
            "models": [
              "gemma4:12b",
              "gemma4:e2b"
            ],
            "weight": 1.0
          }
        ],
        "network": {
          "base_url": "http://192.168.0.58:11434/v1",
          "timeout_secs": 120,
          "max_retries": 2,
          "retry_backoff_initial_ms": 500,
          "retry_backoff_max_ms": 5000
        }
      }
    },
    "governance": {
      "virtual_keys": []
    }
  }

database:
  enabled: false
  url: ""
  existingSecret: ""
  existingSecretKey: "DATABASE_URL"

backend:
  name: pylos
  replicaCount: 2
  existingSecret: "pylos-secret"
  existingSecretKey: "OPENCODE_API_KEY"
  image:
    repository: ghcr.io/jzacharie/pylos
    tag: latest
    pullPolicy: Always
  service:
    port: 3000
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  dataDir: /data
  pvc:
    accessModes:
      - ReadWriteOnce
    size: 1Gi

ui:
  name: pylos-ui
  replicaCount: 1
  image:
    repository: ghcr.io/jzacharie/pylos-ui
    tag: latest
    pullPolicy: Always
  service:
    port: 80
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

dev:
  enabled: false
  name: pylos-dev
  replicaCount: 1
  existingSecret: "pylos-secret"
  existingSecretKey: "OPENCODE_API_KEY"
  image:
    repository: ghcr.io/jzacharie/pylos
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  dataDir: /data
  pvc:
    accessModes:
      - ReadWriteOnce
    size: 1Gi

mcp:
  image:
    repository: ghcr.io/jzacharie/pylos-mcp
    tag: latest
    pullPolicy: Always
  service:
    port: 8000
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  servers: {}
  # Example:
  # servers:
  #   my-tools:
  #     server_type: python
  #     target_url: ""
  #     env_vars:
  #       MCP_API_KEY: "sk-example"
  #       LOG_LEVEL: "debug"

secretStore:
  enabled: true
  name: vault-backend
  kind: ClusterSecretStore
  secretPath: ai/pylos


