namespace: pylos

imagePullSecrets:
  - name: ghcr-auth

config: |
  {
    "version": 2,
    "server": {
      "port": 3000,
      "log_level": "info",
      "enable_logging": true,
      "disable_content_logging": false,
      "database_url": "env.DATABASE_URL"
    },
    "providers": {
      "ollama-jo3": {
        "keys": [
          {
            "name": "local",
            "value": "ollama",
            "models": [
              "gemma4:e2b",
              "gemma4:12b",
              "deepseek-coder-v2:16b",
              "minimax-m2.5:cloud",
              "karanchopda333/whisper:latest",
              "llava:latest",
              "qwen2.5-coder:3b",
              "deepseek-v3.2:cloud",
              "qwen3.5:cloud",
              "qwen3-coder-next:cloud",
              "gpt-oss:120b-cloud"
            ],
            "weight": 1.0
          }
        ],
        "network": {
          "base_url": "http://192.168.0.58:11434/v1",
          "timeout_secs": 120,
          "max_retries": 2,
          "retry_backoff_initial_ms": 500,
          "retry_backoff_max_ms": 5000
        }
      },
      "lemonade-jo3": {
        "keys": [
          {
            "name": "default",
            "value": "env.LEMONADE_API_KEY",
            "models": ["*"],
            "weight": 1.0
          }
        ],
        "network": {
          "base_url": "http://lemonade.lemonade.svc.cluster.local:13305/v1",
          "timeout_secs": 120,
          "max_retries": 2
        }
      },
      "lemonade-optimus": {
        "keys": [
          {
            "name": "default",
            "value": "env.LEMONADE_API_KEY",
            "models": [
              "DeepSeek-Qwen3-8B-GGUF",
              "Gemma-4-E4B-it-GGUF",
              "Qwen3-8B-GGUF",
              "Qwen3-Coder-30B-A3B-Instruct-GGUF",
              "Qwen3.5-9B-GGUF",
              "Qwen3.6-27B-MTP-GGUF",
              "Qwen3.6-35B-A3B-GGUF",
              "nomic-embed-text-v2-moe-GGUF"
            ],
            "weight": 1.0
          }
        ],
        "network": {
          "base_url": "http://192.168.0.58:13305/v1",
          "timeout_secs": 120,
          "max_retries": 2
        }
      }
    },
    "governance": {
      "virtual_keys": []
    }
  }

database:
  enabled: false
  url: ""
  existingSecret: ""
  existingSecretKey: "DATABASE_URL"

qdrant:
  url: "http://qdrant.qdrant.svc:6333"

backend:
  name: pylos
  replicaCount: 2
  existingSecret: "pylos-secret"
  existingSecretKey: "OPENCODE_API_KEY"
  image:
    repository: ghcr.io/jzacharie/pylos
    tag: latest
    pullPolicy: Always
  service:
    port: 3000
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  dataDir: /data
  pvc:
    accessModes:
      - ReadWriteOnce
    size: 1Gi

ui:
  name: pylos-ui
  replicaCount: 1
  image:
    repository: ghcr.io/jzacharie/pylos-ui
    tag: latest
    pullPolicy: Always
  service:
    port: 80
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

dev:
  enabled: false
  name: pylos-dev
  replicaCount: 1
  existingSecret: "pylos-secret"
  existingSecretKey: "OPENCODE_API_KEY"
  image:
    repository: ghcr.io/jzacharie/pylos
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  dataDir: /data
  pvc:
    accessModes:
      - ReadWriteOnce
    size: 1Gi

mcp:
  image:
    repository: ghcr.io/jzacharie/pylos-mcp
    tag: latest
    pullPolicy: Always
  service:
    port: 8000
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  servers: {}
  # Example:
  # servers:
  #   my-tools:
  #     server_type: python
  #     target_url: ""
  #     env_vars:
  #       MCP_API_KEY: "sk-example"
  #       LOG_LEVEL: "debug"

secretStore:
  enabled: true
  name: vault-backend
  kind: ClusterSecretStore
  secretPath: ai/pylos


