{{- if .Values.dev.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pylos.dev.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pylos.dev.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dev.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pylos.dev.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pylos.dev.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
      imagePullSecrets: {{ toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: pylos
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
          image: "{{ .Values.dev.image.repository }}:{{ .Values.dev.image.tag }}"
          imagePullPolicy: {{ .Values.dev.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PYLOS_DATA_DIR
              value: {{ .Values.dev.dataDir }}
            - name: PYLOS_CONFIG
              value: "/app/pylos.json"
            {{- if .Values.database.enabled }}
            - name: DATABASE_URL
              {{- if .Values.database.url }}
              value: {{ .Values.database.url | quote }}
              {{- else if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/pylos.json
              subPath: pylos.json
            - name: data
              mountPath: {{ .Values.dev.dataDir }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.dev.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.configMapName | default (printf "%s-config" (include "pylos.name" .)) }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pylos.dev.name" . }}-data
{{- end }}
