apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pylos.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pylos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "pylos.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pylos.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
      imagePullSecrets: {{ toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: pylos
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.backend.existingSecret | default "pylos-secret" }}
          env:
            - name: PYLOS_DATA_DIR
              value: {{ .Values.backend.dataDir }}
            - name: PYLOS_CONFIG
              value: "/app/pylos.json"
            - name: QDRANT_URL
              value: {{ .Values.qdrant.url | quote }}
            - name: OPENCODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret | default "pylos-secret" }}
                  key: {{ .Values.backend.existingSecretKey | default "OPENCODE_API_KEY" }}
            - name: LEMONADE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret | default "pylos-secret" }}
                  key: LEMONADE_API_KEY
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret | default "pylos-secret" }}
                  key: GH_PAT
            {{- if .Values.database.enabled }}
            - name: DATABASE_URL
              {{- if .Values.database.url }}
              value: {{ .Values.database.url | quote }}
              {{- else if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
              {{- end }}
            {{- end }}
            {{- if .Values.secretStore.enabled }}
            - name: AI1_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pylos-ai1-secret
                  key: API_KEY
            - name: AI1_NAME
              valueFrom:
                secretKeyRef:
                  name: pylos-ai1-secret
                  key: NAME
            - name: AI1_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: pylos-ai1-secret
                  key: PROJECT_NAME
            - name: AI1_PROJECT_NUMBER
              valueFrom:
                secretKeyRef:
                  name: pylos-ai1-secret
                  key: PROJECT_NUMBER
            - name: AI2_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pylos-ai2-secret
                  key: API_KEY
            - name: AI2_NAME
              valueFrom:
                secretKeyRef:
                  name: pylos-ai2-secret
                  key: NAME
            - name: AI2_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: pylos-ai2-secret
                  key: PROJECT_NAME
            - name: AI2_PROJECT_NUMBER
              valueFrom:
                secretKeyRef:
                  name: pylos-ai2-secret
                  key: PROJECT_NUMBER
            - name: AI3_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pylos-ai3-secret
                  key: API_KEY
            - name: AI3_NAME
              valueFrom:
                secretKeyRef:
                  name: pylos-ai3-secret
                  key: NAME
            - name: AI3_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: pylos-ai3-secret
                  key: PROJECT_NAME
            - name: AI3_PROJECT_NUMBER
              valueFrom:
                secretKeyRef:
                  name: pylos-ai3-secret
                  key: PROJECT_NUMBER
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/pylos.json
              subPath: pylos.json
            - name: data
              mountPath: {{ .Values.backend.dataDir }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.configMapName | default (printf "%s-config" (include "pylos.name" .)) }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pylos.name" . }}-data
