{{- if .Values.secretStore.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pylos-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: pylos-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENCODE_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: OPENCODE_API_KEY
    - secretKey: LEMONADE_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: lemonade_api_key
    - secretKey: GH_PAT
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: pat_token
    - secretKey: ALERTMANAGER_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: ALERTMANAGER_PASSWORD
    - secretKey: ALERTMANAGER_USERNAME
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: ALERTMANAGER_USERNAME
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: CLOUDFLARE_ACCOUNT_ID
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: CLOUDFLARE_ACCOUNT_ID
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: CLOUDFLARE_API_TOKEN
    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: DEEPSEEK_API_KEY
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: ENCRYPTION_KEY
    - secretKey: FALLBACK_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: FALLBACK_PASSWORD
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: GEMINI_API_KEY
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: GROQ_API_KEY
    - secretKey: HOME_ASSISTANT_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: HOME_ASSISTANT_PASSWORD
    - secretKey: HOME_ASSISTANT_TOKEN
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: HOME_ASSISTANT_TOKEN
    - secretKey: HOME_ASSISTANT_USER
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: HOME_ASSISTANT_USER
    - secretKey: LLM_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: LLM_API_KEY
    - secretKey: MQTT_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: MQTT_PASSWORD
    - secretKey: MQTT_USER
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: MQTT_USER
    - secretKey: OPENOBSERVE_AUTH
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: OPENOBSERVE_AUTH
    - secretKey: OTA_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: OTA_PASSWORD
    - secretKey: PROXMOX_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: PROXMOX_PASSWORD
    - secretKey: PROXMOX_USER
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: PROXMOX_USER
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: S3_SECRET_KEY
    - secretKey: SLACK_APP_ID
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_APP_ID
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_BOT_TOKEN
    - secretKey: SLACK_CHANNEL_ID
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_CHANNEL_ID
    - secretKey: SLACK_CLIENT_ID
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_CLIENT_ID
    - secretKey: SLACK_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_CLIENT_SECRET
    - secretKey: SLACK_SIGNING_SECRET
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_SIGNING_SECRET
    - secretKey: SLACK_VERIFICATION_TOKEN
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: SLACK_VERIFICATION_TOKEN
    - secretKey: WEB_SERVER_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: WEB_SERVER_PASSWORD
    - secretKey: WIFI_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: WIFI_PASSWORD
    - secretKey: WIFI_PSK
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: WIFI_PSK
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: admin_password
    - secretKey: ADMIN_USER
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: admin_user
    - secretKey: ENCRYPTION_KEY_2
      remoteRef:
        key: {{ .Values.secretStore.secretPath }}
        property: encryption_key
{{- end }}
