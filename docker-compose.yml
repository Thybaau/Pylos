# ─────────────────────────────────────────────────────────────────────────────
# Pylos — Docker Compose local
#
# Stack complète pour tester Pylos en local :
#   - pylos         : le gateway AI (port 3000)
#   - ui            : dashboard React (port 8080)
#   - prometheus    : collecte des métriques /metrics (port 9090)
#   - grafana       : dashboards (port 3001) login: admin/admin
#
# Usage :
#   cp .env.example .env          # puis remplir les clés API
#   docker compose up -d
#   open http://localhost:8080    # UI Pylos
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ───────────────────────────────────────────────────────────────────────────
  # Pylos — AI Gateway
  # ───────────────────────────────────────────────────────────────────────────
  pylos:
    build:
      context: .
      dockerfile: Dockerfile
    image: pylos:local
    container_name: pylos
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      RUST_LOG: "${RUST_LOG:-info}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ROLE_ARN: "${AWS_ROLE_ARN:-}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant.qdrant.svc:6333}"
      PYLOS_CONFIG: "/app/pylos.json"
      PYLOS_DATA_DIR: "/data"
      PYLOS_ADMIN_KEY: "${PYLOS_ADMIN_KEY:-}"
    volumes:
      - ./pylos.json:/app/pylos.json:ro
      - pylos-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - pylos-net

  # ───────────────────────────────────────────────────────────────────────────
  # Pylos UI — Dashboard React (nginx + proxy vers backend)
  # ───────────────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: pylos-ui:local
    container_name: pylos-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      pylos:
        condition: service_healthy
    networks:
      - pylos-net

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus — collecte des métriques
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: pylos-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      pylos:
        condition: service_healthy
    networks:
      - pylos-net

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana — dashboards
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.19
    container_name: pylos-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/pylos.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pylos-net

  # ───────────────────────────────────────────────────────────────────────────
  # Mem0 Sidecar — Memory Management Service
  # ───────────────────────────────────────────────────────────────────────────
  mem0-sidecar:
    build:
      context: .
      dockerfile: pylos/memory/Dockerfile
    image: pylos-mem0-sidecar:local
    container_name: pylos-mem0-sidecar
    restart: unless-stopped
    ports:
      - "7577:7577"
    environment:
      MEM0_BACKEND: "${MEM0_BACKEND:-postgres}"
      MEM0_BACKEND_URL: "${MEM0_BACKEND_URL:-postgres://postgres:postgres@postgres:5432/mem0}"
      MEM0_COLLECTION_NAME: "${MEM0_COLLECTION_NAME:-pylos-memories}"
      MEM0_EMBEDDING_MODEL: "${MEM0_EMBEDDING_MODEL:-nomic-embed-text-v2-moe-GGUF}"
      MEM0_EMBEDDING_PROVIDER: "${MEM0_EMBEDDING_PROVIDER:-ollama}"
      MEM0_EMBEDDING_BASE_URL: "${MEM0_EMBEDDING_BASE_URL:-http://192.168.0.58:11434/v1}"
      MEM0_MAX_CONTEXT_TOKENS: "${MEM0_MAX_CONTEXT_TOKENS:-2048}"
      MEM0_TTL_SECONDS: "${MEM0_TTL_SECONDS:-86400}"
      MEM0_LOG_LEVEL: "${MEM0_LOG_LEVEL:-INFO}"
    depends_on:
      pylos:
        condition: service_healthy
    networks:
      - pylos-net

volumes:
  prometheus-data:
  grafana-data:
  pylos-data:

networks:
  pylos-net:
    driver: bridge
