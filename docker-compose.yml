# ─────────────────────────────────────────────────────────────────────────────
# Pylos — Docker Compose local
#
# Stack complète pour tester Pylos en local :
#   - pylos         : le gateway AI
#   - prometheus    : collecte des métriques /metrics
#   - grafana       : dashboards (login: admin/admin)
#
# Usage :
#   cp .env.example .env          # puis remplir les clés API
#   docker compose up -d
#   curl http://localhost:3000/health
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────────────
  # Pylos — AI Gateway
  # ───────────────────────────────────────────────────────────────────────────
  pylos:
    build:
      context: .
      dockerfile: Dockerfile
    image: pylos:local
    container_name: pylos
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      RUST_LOG: "${RUST_LOG:-info}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - pylos-net

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus — collecte des métriques
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: pylos-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      pylos:
        condition: service_healthy
    networks:
      - pylos-net

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana — dashboards
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: pylos-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/pylos.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pylos-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  pylos-net:
    driver: bridge
